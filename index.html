<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Qsu!</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; cursor: none; touch-action: manipulation; }
        
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

        #bg-video {
            position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            width: auto; height: auto; z-index: -1; transform: translate(-50%, -50%);
            object-fit: cover; filter: brightness(0.3) contrast(1.1);
        }

        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 2000; transition: opacity 0.1s;
        }

        @keyframes beatPulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.02); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .pulse-active { animation: beatPulse 0.5s infinite ease-in-out; }

        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.95) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: 0.5s; }
        .menu-content { text-align: center; }
        h1 { font-size: 85px; letter-spacing: 20px; margin: 0; font-weight: 900; text-shadow: 0 0 30px rgba(0,210,255,0.4); }
        .version-badge { background: #00d2ff; color: black; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; letter-spacing: 2px; display: inline-block; margin-bottom: 20px; }
        
        /* Mod Paneli Stilleri */
        .mod-container { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        .mod-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.3); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; backdrop-filter: blur(5px); }
        .mod-btn:hover { background: rgba(0, 210, 255, 0.2); }
        .mod-btn.active { background: #00d2ff; color: black; box-shadow: 0 0 20px rgba(0,210,255,0.5); border-color: transparent; }

        .btn-list { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 18px 60px; color: #fff; font-size: 18px; cursor: pointer; font-weight: bold; width: 400px; transition: 0.3s; border-radius: 10px; backdrop-filter: blur(5px); }
        .btn:hover { background: #00d2ff; color: #000; box-shadow: 0 0 40px rgba(0,210,255,0.6); transform: translateY(-3px); }

        #custom-panel {
            position: absolute; top: 0; right: -350px; width: 300px; height: 100%;
            background: rgba(0, 0, 0, 0.9); padding: 40px 25px;
            backdrop-filter: blur(20px); border-left: 1px solid rgba(255,255,255,0.1);
            z-index: 1100; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #custom-panel.active { right: 0; }
        .toggle-panel-btn { position: absolute; top: 30px; right: 30px; background: white; color: black; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 1050; transition: 0.3s; }
        
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; color: #00d2ff; margin-bottom: 8px; }
        .input-group input { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px; color: white; border-radius: 5px; }
        
        .play-custom { width: 100%; background: #00d2ff; border: none; padding: 15px; border-radius: 10px; color: black; font-weight: bold; cursor: pointer; margin-top: 20px; }

        #ui { position: absolute; top: 40px; left: 40px; font-size: 28px; font-weight: 900; z-index: 100; opacity: 0; transition: 0.5s; letter-spacing: 2px; }
        #guide { position: absolute; width: 35px; height: 35px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; box-shadow: 0 0 20px white; display: none; transition: 0.15s ease-out; }
        #combo-ui { position: absolute; bottom: 50px; width: 100%; text-align: center; font-size: 60px; font-weight: 900; z-index: 100; pointer-events: none; opacity: 0; transition: 0.2s; color: #00d2ff; text-shadow: 0 0 25px rgba(0,210,255,0.5); }
        
        .note { position: absolute; width: 90px; height: 90px; border-radius: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; background: rgba(0, 0, 0, 0.8); z-index: 10; border: 4px solid; transition: background 0.2s, transform 0.1s; cursor: pointer; user-select: none; will-change: transform, opacity; }
        .note small { font-size: 10px; letter-spacing: 1px; margin-top: -5px; }
        .note.holding { background: rgba(255, 255, 255, 0.3) !important; transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 30px white; }
        
        .approach { position: absolute; border: 3px solid; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 11; will-change: transform; }
        
        .hold-trail { position: absolute; background: rgba(150, 150, 150, 0.2); border-radius: 50px; pointer-events: none; z-index: 8; transform-origin: top center; transition: background 0.2s; }
        .hold-trail.success { background: rgba(0, 255, 0, 0.3); box-shadow: 0 0 20px rgba(0,255,0,0.5); }
        
        .shake { animation: shakeAnim 0.15s ease-in-out; }
        @keyframes shakeAnim { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(6px, 6px); } 75% { transform: translate(-6px, -6px); } }
        .hit-fx { transform: translate(-50%, -50%) scale(2.2) !important; opacity: 0 !important; transition: 0.4s ease-out !important; }

        /* [YENİ] Vuruş değerlendirme yazıları (300, 100, MISS) için stil */
        .hit-rating {
            position: absolute; font-size: 26px; font-weight: 900; letter-spacing: 2px;
            text-shadow: 0 0 15px black; pointer-events: none; z-index: 105;
            animation: ratingFade 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes ratingFade {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -120%) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="flash"></div>
        <video id="bg-video" muted loop playsinline></video>

        <button id="openBtn" class="toggle-panel-btn" onclick="togglePanel(true)">🎵 ŞARKI EKLE</button>

        <div id="custom-panel">
            <button style="background:none; border:none; color:white; font-size:24px; cursor:pointer;" onclick="togglePanel(false)">✕</button>
            <h2 style="margin-top: 20px;">Qsu! Custom</h2>
            <div class="input-group">
                <label>MP3 Dosyası</label>
                <input type="file" id="audioInput" accept="audio/*">
            </div>
            <div class="input-group">
                <label>MP4 Dosyası</label>
                <input type="file" id="videoInput" accept="video/*">
            </div>
            <button class="play-custom" onclick="startCustom()">Qsu! BAŞLAT ▶</button>
        </div>

        <div id="menu">
            <div class="menu-content">
                <div class="version-badge">DEMO v2.2</div>
                <h1>Qsu!</h1>
                <p style="opacity: 0.4; margin-bottom: 30px; letter-spacing: 5px;">BEAT THE MUSIC</p>
                
                <div class="mod-container">
                    <button id="mod-mirror" class="mod-btn" onclick="toggleMod('mirror')">MIRROR</button>
                    <button id="mod-fast" class="mod-btn" onclick="toggleMod('fast')">DOUBLE TIME (1.5x)</button>
                </div>

                <div class="btn-list">
                    <button class="btn" onclick="start(1)">CRY FOR ME</button>
                    <button class="btn" onclick="start(2)">ENIGMATIC ENCOUNTER</button>
                    <button class="btn" onclick="start(3)">THE RESET (MEME)</button>
                </div>
            </div>
        </div>

        <div id="ui">
            SCORE: <span id="score">000000</span> 
            <span style="margin-left:20px; color:#00d2ff;">RANK: <span id="rank">C</span></span>
        </div>
        
        <div id="combo-ui">
            <span id="combo-count">0</span><br>
            <small style="font-size:15px; letter-spacing:8px; color:white;">COMBO</small>
        </div>
        
        <div id="guide"></div>
    </div>

    <audio id="music"></audio>

    <script>
        const music = document.getElementById('music');
        const guide = document.getElementById('guide');
        const scoreEl = document.getElementById('score');
        const rankEl = document.getElementById('rank');
        const flashEl = document.getElementById('flash');
        const bgVideo = document.getElementById('bg-video');
        const viewport = document.getElementById('viewport');
        const panel = document.getElementById('custom-panel');
        const openBtn = document.getElementById('openBtn');
        const ui = document.getElementById('ui');
        const comboCountEl = document.getElementById('combo-count');
        const comboUiEl = document.getElementById('combo-ui');
        
        let score = 0;
        let combo = 0;
        let isPlaying = false;
        let activeNotes = [];
        let keysPressed = {};
        let activeMods = { mirror: false, fast: false };

        const sequence = [
            {code:"Digit1", label:"1", color:"#00d2ff"}, 
            {code:"Digit2", label:"2", color:"#ff00ff"}
        ];
        let seqIndex = 0;

        // [YENİ] Kararlı Delta-Time takibi için zamanlayıcı referansı
        let lastFrameTime = performance.now();

        function toggleMod(mod) {
            activeMods[mod] = !activeMods[mod];
            document.getElementById(`mod-${mod}`).classList.toggle('active');
        }

        function togglePanel(isOpen) {
            panel.classList.toggle('active', isOpen);
        }

        function getRank(s) {
            if (s > 60000) return 'SS';
            if (s > 40000) return 'S';
            if (s > 20000) return 'A';
            if (s > 10000) return 'B';
            return 'C';
        }

        function start(songId) {
            hideMenu();
            if (songId === 1) {
                music.src = "Cry For Me WA WA WA.mp3";
                bgVideo.src = "cryforme.mp4";
                launchGame(750);
            } else if (songId === 2) {
                music.src = "[HQ] An Enigmatic Encounter V2 - Undertale Last Breath (Phase 3).mp3";
                bgVideo.src = "enigmatic.mp4";
                launchGame(500);
            } else if (songId === 3) {
                music.src = "Girlfriends - New Computers.mp3";
                bgVideo.src = "THE RESET.mp4";
                launchGame(550);
            }
        }

        function startCustom() {
            const audioFile = document.getElementById('audioInput').files[0];
            const videoFile = document.getElementById('videoInput').files[0];
            if (!audioFile) return alert("Müzik seç!");
            hideMenu();
            music.src = URL.createObjectURL(audioFile);
            if (videoFile) bgVideo.src = URL.createObjectURL(videoFile);
            launchGame(600);
        }

        function hideMenu() {
            document.getElementById('menu').style.opacity = '0';
            setTimeout(() => document.getElementById('menu').style.display = 'none', 500);
            panel.classList.remove('active');
            openBtn.style.display = 'none';
            ui.style.opacity = '1';
            guide.style.display = 'block';
        }

        function launchGame(spawnRate) {
            if (activeMods.fast) {
                music.playbackRate = 1.5;
                bgVideo.playbackRate = 1.5;
                spawnRate = spawnRate / 1.5;
            } else {
                music.playbackRate = 1.0;
                bgVideo.playbackRate = 1.0;
            }

            bgVideo.load();
            bgVideo.play();
            bgVideo.classList.add('pulse-active');
            
            music.play().then(() => {
                isPlaying = true;
                lastFrameTime = performance.now(); // Döngüyü sıfırla

                const producer = () => {
                    if(!isPlaying) return;
                    if(activeNotes.length < 4) moveAndSpawn(); // Limit 4 yapıldı, akıcılık sağlandı
                    setTimeout(producer, spawnRate);
                };
                producer();
                requestAnimationFrame(gameLoop);
            });
        }

        function triggerShake() {
            viewport.classList.remove('shake');
            void viewport.offsetWidth; 
            viewport.classList.add('shake');
            combo = 0;
            comboUiEl.style.opacity = "0";
        }

        // [YENİ] Ekranda puan durumunu (300, 100, MISS) fırlatan görsel efekt fonksiyonu
        function showHitRating(x, y, text, color) {
            const ratingEl = document.createElement('div');
            ratingEl.className = 'hit-rating';
            ratingEl.style.left = x + 'px';
            ratingEl.style.top = y + 'px';
            ratingEl.style.color = color;
            ratingEl.innerText = text;
            viewport.appendChild(ratingEl);
            setTimeout(() => ratingEl.remove(), 400);
        }

        function moveAndSpawn() {
            let rawX = Math.random() * (window.innerWidth - 400) + 200;
            let startX = activeMods.mirror ? (window.innerWidth - rawX) : rawX;
            let startY = Math.random() * (window.innerHeight/2 - 200) + window.innerHeight/2 + 100;
            
            guide.style.left = startX + 'px'; guide.style.top = startY + 'px';

            const item = sequence[seqIndex];
            const isLong = Math.random() > 0.7;

            let trailEl = null;
            let targetY = startY;
            const holdDistance = 250;

            if (isLong) {
                targetY = startY - holdDistance;
                trailEl = document.createElement('div');
                trailEl.className = 'hold-trail';
                trailEl.style.left = (startX - 45) + 'px';
                trailEl.style.top = targetY + 'px';
                trailEl.style.width = '90px';
                trailEl.style.height = holdDistance + 'px';
                viewport.appendChild(trailEl);
            }

            const nEl = document.createElement('div');
            nEl.className = 'note'; nEl.style.left = startX+'px'; nEl.style.top = startY+'px';
            nEl.style.color = item.color; nEl.style.borderColor = item.color;
            nEl.innerHTML = item.label + (isLong ? "<br><small>HOLD</small>" : "");

            nEl.addEventListener('touchstart', (e) => { e.preventDefault(); handleInteraction(item.code); });
            nEl.addEventListener('touchend', (e) => { e.preventDefault(); handleRelease(item.code); });

            const aEl = document.createElement('div');
            aEl.className = 'approach'; aEl.style.left = startX+'px'; aEl.style.top = startY+'px';
            aEl.style.borderColor = item.color;
            // İlk scale değerini CSS yerine doğrudan JS üzerinden yönetmek için tanımlıyoruz
            aEl.style.transform = 'translate(-50%, -50%) scale(4.0)';

            viewport.appendChild(nEl); viewport.appendChild(aEl);
            
            activeNotes.push({ 
                el: nEl, app: aEl, trailEl: trailEl, code: item.code, scale: 4.0, hit: false, 
                isLong: isLong, startX: startX, startY: startY, targetY: targetY, 
                holdTicks: 0, maxTicks: 50, completed: false 
            });
            seqIndex = (seqIndex + 1) % sequence.length;
        }

        function gameLoop(now) {
            if (!isPlaying) return;

            // Delta time hesabı (FPS değişimlerinde oyun hızını sabit tutar)
            const dt = (now - lastFrameTime) / 16.666;
            lastFrameTime = now;

            const isHoldingAny = activeNotes.some(n => n.hit && n.isLong && !n.completed);
            
            for (let i = activeNotes.length - 1; i >= 0; i--) {
                const n = activeNotes[i];
                if (!n.hit) {
                    if (!isHoldingAny) {
                        // Küçülme hızını dt ile çarparak stabil hale getiriyoruz
                        n.scale -= (activeMods.fast ? 0.075 : 0.05) * dt;
                        n.app.style.transform = `translate(-50%, -50%) scale(${n.scale})`;
                        
                        // Kaçırma eşiği (0.80'in altına inerse artık basılamaz, MISS olur)
                        if (n.scale <= 0.80) { 
                            showHitRating(n.startX, n.startY, "MISS", "#ff3838");
                            triggerShake(); 
                            removeNote(n); 
                        }
                    }
                } else if (n.isLong && !n.completed) {
                    if (keysPressed[n.code]) {
                        n.holdTicks += dt;
                        n.el.classList.add('holding');
                        if(n.trailEl) n.trailEl.classList.add('success');
                        
                        score += Math.round(5 * dt); 
                        scoreEl.innerText = score.toString().padStart(6, '0');
                        
                        const progress = n.holdTicks / n.maxTicks;
                        const currentY = n.startY + (n.targetY - n.startY) * progress;
                        
                        guide.style.left = n.startX + 'px'; guide.style.top = n.targetY + 'px';
                        n.el.style.top = currentY + 'px';
                        
                        if(n.trailEl) n.trailEl.style.height = (n.startY - currentY) + 'px';
                        if (n.holdTicks >= n.maxTicks) { 
                            n.completed = true; 
                            successFinish(n, 300, "PERFECT", "#00ffcc"); 
                        }
                    } else { 
                        showHitRating(n.startX, n.startY, "BREAK", "#ff9d00");
                        triggerShake(); 
                        removeNote(n); 
                    }
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function handleInteraction(code) {
            if (!isPlaying) return;
            keysPressed[code] = true;
            
            // Ekrandaki basılmamış en eski/uygun notayı bul
            const idx = activeNotes.findIndex(n => n.code === code && !n.hit);
            
            if (idx !== -1) {
                const n = activeNotes[idx];
                // Tam basılması gereken an n.scale'in 1.0 olduğu andır. Sapmayı ölçüyoruz.
                const accuracy = Math.abs(n.scale - 1.0);

                if (accuracy < 0.20) {
                    // Kusursuz vuruş
                    n.hit = true;
                    if (!n.isLong) successFinish(n, 300, "300", "#00ffcc"); else if(n.app) n.app.remove();
                } else if (accuracy < 0.45) {
                    // Erken veya geç vuruş
                    n.hit = true;
                    if (!n.isLong) successFinish(n, 100, "100", "#ffcc00"); else if(n.app) n.app.remove();
                } else if (accuracy < 0.65) {
                    // Kötü vuruş
                    n.hit = true;
                    if (!n.isLong) successFinish(n, 50, "50", "#ff6600"); else if(n.app) n.app.remove();
                }
                // Belirlenen aralıkların dışındaysa tuşa basılsa bile döngü onu MISS olarak yakalayacak.
            }
        }

        function handleRelease(code) { keysPressed[code] = false; }

        function removeNote(n) {
            if(n.el.parentNode) n.el.remove();
            if(n.app && n.app.parentNode) n.app.remove();
            if(n.trailEl && n.trailEl.parentNode) n.trailEl.remove();
            activeNotes = activeNotes.filter(item => item !== n);
        }

        function successFinish(n, calculatedPoints, ratingText, ratingColor) {
            score += calculatedPoints; 
            combo++; 
            flashEl.style.opacity = "0.2";
            setTimeout(() => flashEl.style.opacity = "0", 100);
            
            // Değerlendirme yazısını fırlat (300, 100, 50)
            showHitRating(n.startX, n.startY, ratingText, ratingColor);

            comboCountEl.innerText = combo; 
            comboUiEl.style.opacity = "1";
            scoreEl.innerText = score.toString().padStart(6, '0');
            rankEl.innerText = getRank(score);
            
            n.el.classList.add('hit-fx'); 
            if(n.trailEl) n.trailEl.remove();
            setTimeout(() => removeNote(n), 300);
        }

        window.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            if (keysPressed[e.code]) return;
            handleInteraction(e.code);
        });
        window.addEventListener('keyup', (e) => handleRelease(e.code));
    </script>
</body>
</html>
